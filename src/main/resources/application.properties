#what url to writ in jdbc

# Persistent H2 Database (Recommended for development)
spring.datasource.url=jdbc:h2:file:./data/finance-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;IFEXISTS=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
server.port=8081
spring.jpa.show-sql=false
spring.h2.console.enabled=true